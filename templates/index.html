<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Code Review Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:1rem 2rem;display:flex;align-items:center;gap:12px}
header h1{font-size:18px;font-weight:600}
.repo{font-size:13px;color:#8b949e;background:#21262d;padding:4px 10px;border-radius:6px;border:1px solid #30363d}
.dot{width:8px;height:8px;border-radius:50%;background:#3fb950;display:inline-block;margin-right:6px}
main{padding:2rem;max-width:1100px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:2rem}
.stat-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:1.25rem}
.stat-card .label{font-size:12px;color:#8b949e;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:32px;font-weight:700;color:#e6edf3}
.value.blue{color:#58a6ff}.value.green{color:#3fb950}.value.purple{color:#bc8cff}.value.orange{color:#d29922}
.section-title{font-size:15px;font-weight:600;margin-bottom:1rem}
.table-wrap{background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:#21262d;font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:0.5px;padding:10px 16px;text-align:left;font-weight:500}
td{padding:12px 16px;font-size:13px;border-top:1px solid #21262d;vertical-align:middle}
td a{color:#58a6ff;text-decoration:none}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge.open{background:#1a4721;color:#3fb950;border:1px solid #238636}
.badge.closed{background:#2d1b2e;color:#bc8cff;border:1px solid #8957e5}
.empty{text-align:center;padding:3rem;color:#8b949e;font-size:14px}
.loading{text-align:center;padding:3rem;color:#8b949e;font-size:14px}
.refresh-btn{margin-left:auto;background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<header>
<span><span class="dot"></span></span>
<h1>AI Code Review Dashboard</h1>
<span class="repo">{{ repo }}</span>
<button class="refresh-btn" onclick="load()">Refresh</button>
</header>
<main>
<div class="stats-grid">
<div class="stat-card"><div class="label">Total PRs</div><div class="value blue" id="totalPRs">-</div></div>
<div class="stat-card"><div class="label">PRs Reviewed by AI</div><div class="value green" id="reviewedPRs">-</div></div>
<div class="stat-card"><div class="label">AI Comments Posted</div><div class="value purple" id="totalComments">-</div></div>
<div class="stat-card"><div class="label">Repo Stars</div><div class="value orange" id="repoStars">-</div></div>
</div>
<div class="section-title">Recent AI Reviews</div>
<div class="table-wrap">
<div class="loading" id="tableLoading">Loading reviews...</div>
<table id="reviewTable" style="display:none">
<thead><tr><th>PR</th><th>Title</th><th>Author</th><th>Status</th><th>AI Comments</th><th>Date</th></tr></thead>
<tbody id="reviewBody"></tbody>
</table>
<div class="empty" id="emptyState" style="display:none">No AI-reviewed PRs yet. Open a pull request to trigger the bot!</div>
</div>
</main>
<script>
async function load(){
document.getElementById("tableLoading").style.display="block";
document.getElementById("reviewTable").style.display="none";
document.getElementById("emptyState").style.display="none";
try{
const res=await fetch("/api/stats");
const data=await res.json();
document.getElementById("totalPRs").textContent=data.total_prs;
document.getElementById("reviewedPRs").textContent=data.reviewed_prs;
document.getElementById("totalComments").textContent=data.total_comments;
document.getElementById("repoStars").textContent=data.stars;
document.getElementById("tableLoading").style.display="none";
if(data.recent_reviews.length===0){document.getElementById("emptyState").style.display="block";}
else{
const tbody=document.getElementById("reviewBody");
tbody.innerHTML=data.recent_reviews.map(r=>'<tr><td><a href="'+r.url+'" target="_blank">#'+r.pr_number+'</a></td><td>'+r.title+'</td><td>'+r.author+'</td><td><span class="badge '+r.state+'">'+r.state+'</span></td><td>'+r.comments+'</td><td>'+r.created_at+'</td></tr>').join("");
document.getElementById("reviewTable").style.display="table";
}
}catch(e){document.getElementById("tableLoading").textContent="Error loading data: "+e.message;}
}
load();
</script>
</body>
</html>
